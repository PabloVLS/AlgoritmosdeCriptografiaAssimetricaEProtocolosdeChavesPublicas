<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Demo RSA (local)</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 20px auto; }
    textarea { width: 100%; height: 80px; }
    input[type=text] { width: 100%; }
    pre { background: #f6f6f6; padding: 10px; overflow:auto }
    .row { display:flex; gap:12px }
    .col { flex:1 }
    button { padding:8px 12px }
  </style>
</head>
<body>
  <h1>Demo RSA (servidor local)</h1>

  <section>
    <h2>1) Gerar chaves</h2>
    <label>Bits (ex.: 512 para demo rápido)</label>
    <input id="bits" type="text" value="512" />
    <button id="gen">Gerar chaves</button>
    <pre id="keys">Nenhuma chave gerada ainda.</pre>
  </section>

  <section>
    <h2>2) Cifrar mensagem</h2>
    <textarea id="message">Olá, isto é um teste de RSA via UI.</textarea>
    <div class="row">
      <div class="col">
        <button id="encrypt">Cifrar (usar chaves geradas)</button>
      </div>
      <div class="col">
        <button id="encrypt_custom">Cifrar (usar e/n fornecidos)</button>
      </div>
    </div>
    <label>Ou informe `e` e `n` (decimais) separados:</label>
    <input id="custom_en" type="text" placeholder="e,n" />
    <h3>Cifrados</h3>
    <pre id="cipher">(nenhum)</pre>
  </section>

  <section>
    <h2>3) Decifrar</h2>
    <button id="decrypt">Decifrar (usar chaves geradas)</button>
    <h3>Resultado</h3>
    <pre id="plain">(nenhum)</pre>
  </section>

  <script>
    async function postJson(path, body){
      const res = await fetch(path, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body)
      });
      return res.json();
    }

    document.getElementById('gen').onclick = async () => {
      const bits = parseInt(document.getElementById('bits').value || '512', 10);
      document.getElementById('keys').textContent = 'Gerando... aguarde';
      const r = await postJson('/api/generate', {bits});
      document.getElementById('keys').textContent = 'n: ' + r.n + '\n\ne: ' + r.e + '\n\nd (privada): ' + r.d.substring(0,80) + '...';
    }

    document.getElementById('encrypt').onclick = async () => {
      const message = document.getElementById('message').value;
      const r = await postJson('/api/encrypt', {message});
      document.getElementById('cipher').textContent = JSON.stringify(r, null, 2);
    }

    document.getElementById('encrypt_custom').onclick = async () => {
      const message = document.getElementById('message').value;
      const custom = document.getElementById('custom_en').value.trim();
      if(!custom.includes(',')) { alert('Informe e,n'); return }
      const parts = custom.split(',').map(s=>s.trim());
      const e = parts[0]; const n = parts[1];
      const r = await postJson('/api/encrypt', {message, e, n});
      document.getElementById('cipher').textContent = JSON.stringify(r, null, 2);
    }

    document.getElementById('decrypt').onclick = async () => {
      const cipherText = document.getElementById('cipher').textContent;
      if(!cipherText || cipherText === '(nenhum)') { alert('Nenhum cifrado disponível'); return }
      const parsed = JSON.parse(cipherText);
      const r = await postJson('/api/decrypt', parsed);
      document.getElementById('plain').textContent = r.message;
    }
  </script>
</body>
</html>
